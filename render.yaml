services:
  - type: web
    name: subtitler
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Lower the upload cap on the small free instance so it doesn't run out
      # of memory. 1-3 minute clips are well under this.
      - key: MAX_UPLOAD_MB
        value: "200"
      # Your ElevenLabs key — set the actual value in the Render dashboard,
      # NOT here (keeps it out of your public code).
      - key: ELEVENLABS_API_KEY
        sync: false
      # Password to use the site. Set the actual value in the dashboard.
      # Anyone visiting must enter it (username can be anything, password = this).
      - key: APP_PASSCODE
        sync: false
