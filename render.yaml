services:
  - type: web
    name: subtitler
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      # Upload cap for the free instance. Rendering memory is now flat (~180 MB
      # at any resolution), so the real limits are disk space and time, not RAM.
      # 500 MB leaves headroom on the small free disk.
      - key: MAX_UPLOAD_MB
        value: "500"
      # Your ElevenLabs key — set the actual value in the Render dashboard,
      # NOT here (keeps it out of your public code).
      - key: ELEVENLABS_API_KEY
        sync: false
      # Password to use the site. Set the actual value in the dashboard.
      # Anyone visiting must enter it (username can be anything, password = this).
      - key: APP_PASSCODE
        sync: false
